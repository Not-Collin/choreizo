{% extends "base.html" %}
{% block title %}Members — Choreizo{% endblock %}
{% block content %}
<div class="page-header">
  <hgroup>
    <h2>Members</h2>
    <p class="muted">{{ users|length }} member{{ '' if users|length == 1 else 's' }}</p>
  </hgroup>
  <a href="/admin/members/invite" role="button" style="font-size:0.85rem; padding:0.2rem 0.65rem;">+ Invite</a>
</div>

<figure>
  <table class="compact striped">
    <thead>
      <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Telegram</th>
        <th>Send time</th>
        <th>Active</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td><strong>{{ u.name }}</strong></td>
        <td>
          {% if u.is_admin %}
            <span style="font-size:0.8rem; font-weight:500;">admin</span>
          {% elif u.is_escalation %}
            <span class="muted" style="font-size:0.8rem;">escalation</span>
          {% else %}
            <span class="muted" style="font-size:0.8rem;">member</span>
          {% endif %}
        </td>
        <td>
          {% if u.telegram_chat_id %}
            <span class="st-ok" style="font-size:0.8rem;">@{{ u.telegram_username or u.telegram_chat_id }}</span>
          {% else %}
            <span class="muted" style="font-size:0.8rem;">unlinked</span>
          {% endif %}
        </td>
        <td class="muted">{{ u.send_time }}</td>
        <td>
          {% if u.active %}<span class="st-ok">✓</span>{% else %}<span class="muted">—</span>{% endif %}
        </td>
        <td style="text-align:right;">
          <div style="display:flex; gap:0.3rem; justify-content:flex-end; flex-wrap:wrap;">
            <form method="post" action="/admin/members/{{ u.id }}/toggle-admin" style="margin:0;">
              <button type="submit" class="{% if u.is_admin %}contrast{% else %}secondary{% endif %} outline"
                      style="padding:0.15rem 0.5rem; font-size:0.8rem;"
                      {% if u.id == current_user.id and u.is_admin %}
                        title="Cannot remove your own admin role" disabled
                      {% endif %}>
                {{ '− admin' if u.is_admin else '+ admin' }}
              </button>
            </form>
            <form method="post" action="/admin/members/{{ u.id }}/toggle" style="margin:0;">
              <button type="submit" class="secondary outline" style="padding:0.15rem 0.5rem; font-size:0.8rem;">
                {{ 'deactivate' if u.active else 'reactivate' }}
              </button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</figure>
{% endblock %}
